<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerAI — Intelligent Career Counselor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--bg2:#0d0d14;--surface:#111118;--surface2:#18181f;--surface3:#1f1f2a;--border:#2a2a3a;--border2:#363648;--blue:#4f8ef7;--purple:#9b6dff;--cyan:#00d4ff;--green:#00e5a0;--pink:#ff6b9d;--orange:#ff9f43;--text:#f0f0f8;--text2:#a0a0c0;--text3:#606080;--glow-blue:rgba(79,142,247,0.2);--glow-purple:rgba(155,109,255,0.2)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12}
.orb1{width:600px;height:600px;background:var(--purple);top:-200px;left:-200px;animation:orbFloat1 20s ease-in-out infinite}
.orb2{width:500px;height:500px;background:var(--blue);bottom:-200px;right:-100px;animation:orbFloat2 25s ease-in-out infinite}
.orb3{width:400px;height:400px;background:var(--cyan);top:50%;left:50%;transform:translate(-50%,-50%);animation:orbFloat3 18s ease-in-out infinite}
@keyframes orbFloat1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-30px)}}
@keyframes orbFloat3{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-45%,-55%)}}
.grid-overlay{position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px);background-size:50px 50px;z-index:0;pointer-events:none}
.app{position:relative;z-index:1;display:grid;grid-template-columns:260px 1fr;grid-template-rows:60px 1fr;min-height:100vh}
.topbar{grid-column:1/-1;background:rgba(17,17,24,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;letter-spacing:-0.5px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-subtitle{font-size:12px;color:var(--text3);border-left:1px solid var(--border);padding-left:16px}
.topbar-right{margin-left:auto}
.ai-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green);background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);padding:5px 12px;border-radius:50px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.sidebar{background:rgba(17,17,24,0.6);backdrop-filter:blur(20px);border-right:1px solid var(--border);padding:20px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.sidebar-section{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:12px 12px 6px;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all 0.2s;font-size:14px;font-weight:500;color:var(--text2);border:1px solid transparent}
.nav-item:hover{color:var(--text);border-color:var(--border2);background:rgba(79,142,247,0.05)}
.nav-item.active{color:var(--text);border-color:rgba(79,142,247,0.3);background:rgba(79,142,247,0.08)}
.nav-icon{font-size:18px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:linear-gradient(135deg,var(--blue),var(--purple));color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:50px}
.main{overflow-y:auto;display:flex;flex-direction:column}
.panel{display:none;flex-direction:column;padding:24px;gap:20px;animation:panelIn 0.4s cubic-bezier(0.16,1,0.3,1)}
.panel.active{display:flex}
@keyframes panelIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.page-header h1{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1.2}
.page-header p{color:var(--text2);font-size:14px;margin-top:6px}
.grad-blue{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.grad-green{background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.grad-orange{background:linear-gradient(135deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.grad-cyan{background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all 0.3s}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.3)}
.stat-icon{font-size:28px;margin-bottom:12px}
.stat-label{font-size:12px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.stat-value{font-size:22px;font-weight:800;margin-top:4px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.feature-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;cursor:pointer;transition:all 0.3s;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden}
.feature-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--c1),var(--c2));opacity:0;transition:opacity 0.3s}
.feature-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.feature-card:hover::before{opacity:1}
.feature-emoji{font-size:32px}
.feature-title{font-size:16px;font-weight:700}
.feature-desc{font-size:13px;color:var(--text2);line-height:1.6;flex:1}
.feature-tags{display:flex;flex-wrap:wrap;gap:6px}
.ftag{font-size:11px;padding:3px 9px;border-radius:50px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);font-family:'JetBrains Mono',monospace}
.chat-wrapper{display:flex;flex-direction:column;height:calc(100vh - 60px - 48px);background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.chat-topbar{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface2)}
.chat-avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.chat-info h4{font-size:14px;font-weight:700}
.chat-info p{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px}
.chat-modes{margin-left:auto;display:flex;gap:6px}
.mode-btn{padding:6px 14px;border-radius:50px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif}
.mode-btn.active{background:linear-gradient(135deg,var(--blue),var(--purple));border-color:transparent;color:white}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.msg{display:flex;gap:10px;animation:msgIn 0.3s cubic-bezier(0.16,1,0.3,1)}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.msg.bot .msg-avatar{background:linear-gradient(135deg,var(--blue),var(--purple))}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--purple),var(--pink))}
.msg-bubble{max-width:78%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7}
.msg.bot .msg-bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--blue),var(--purple));border-bottom-right-radius:4px;color:white}
.msg-bubble strong{color:var(--cyan)}
.msg-bubble .tag{display:inline-block;background:rgba(79,142,247,0.15);border:1px solid rgba(79,142,247,0.3);color:var(--blue);padding:2px 8px;border-radius:4px;font-size:11px;font-family:'JetBrains Mono',monospace;margin:2px}
.typing-dots{display:flex;gap:4px;align-items:center;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;width:fit-content}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:td 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.2s;background:var(--purple)}
.typing-dots span:nth-child(3){animation-delay:.4s;background:var(--cyan)}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.chat-bottom{border-top:1px solid var(--border);background:var(--surface2)}
.quick-btns{padding:10px 16px 0;display:flex;flex-wrap:wrap;gap:6px}
.qbtn{padding:6px 14px;border-radius:50px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif;font-weight:500}
.qbtn:hover{border-color:var(--blue);color:var(--text);background:rgba(79,142,247,0.08)}
.chat-input-row{display:flex;gap:10px;padding:12px 16px}
.chat-input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:12px;font-size:14px;font-family:'Outfit',sans-serif;resize:none;outline:none;transition:border-color 0.2s;height:46px}
.chat-input:focus{border-color:var(--blue)}
.chat-input::placeholder{color:var(--text3)}
.send-btn{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;color:white;font-size:18px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{transform:scale(1.05)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px}
.assess-track{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden}
.assess-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple),var(--cyan));transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);border-radius:99px}
.cat-chip{padding:4px 12px;border-radius:50px;font-size:11px;font-weight:600;border:1px solid var(--border);color:var(--text3)}
.cat-chip.done{background:rgba(0,229,160,0.1);border-color:rgba(0,229,160,0.3);color:var(--green)}
.cat-chip.active{background:rgba(79,142,247,0.1);border-color:rgba(79,142,247,0.3);color:var(--blue)}
.q-category{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);margin-bottom:10px}
.q-text{font-size:18px;font-weight:700;line-height:1.5;margin-bottom:20px}
.q-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.q-opt{padding:14px 18px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:14px;transition:all 0.2s;color:var(--text2);text-align:left;font-family:'Outfit',sans-serif;font-weight:500;display:flex;align-items:center;gap:10px}
.q-opt:hover{border-color:var(--blue);color:var(--text);background:rgba(79,142,247,0.08)}
.q-opt.selected{border-color:var(--purple);background:rgba(155,109,255,0.1);color:var(--text)}
.btn-primary{padding:12px 24px;border-radius:12px;border:none;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--blue),var(--purple));color:white;transition:all 0.2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--glow-blue)}
.btn-ghost{padding:12px 24px;border-radius:12px;border:1px solid var(--border);font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;background:var(--surface2);color:var(--text2);transition:all 0.2s}
.resume-upload{border:2px dashed var(--border2);border-radius:16px;padding:48px;text-align:center;cursor:pointer;transition:all 0.3s;background:var(--surface)}
.resume-upload:hover{border-color:var(--blue);background:rgba(79,142,247,0.04)}
.fmt-tag{padding:4px 12px;border-radius:50px;background:var(--surface2);border:1px solid var(--border);font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text2)}
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center}
.score-ring{width:90px;height:90px;border-radius:50%;margin:0 auto 14px;position:relative;display:flex;align-items:center;justify-content:center}
.score-inner{width:70px;height:70px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;flex-direction:column}
.score-num{font-size:20px;font-weight:800;line-height:1}
.score-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.skill-chip{padding:5px 12px;border-radius:6px;font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:500}
.chip-ok{background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.3);color:var(--green)}
.chip-miss{background:rgba(255,107,157,0.1);border:1px solid rgba(255,107,157,0.3);color:var(--pink)}
.chip-blue{background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.3);color:var(--blue)}
.rs-title{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.rs-title::before{content:'';width:3px;height:14px;border-radius:99px;background:linear-gradient(var(--blue),var(--purple))}
.roadmap-grid{display:grid;grid-template-columns:200px 1fr;gap:20px;height:calc(100vh - 200px)}
.roadmap-list{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;overflow-y:auto}
.career-opt{padding:11px 12px;border-radius:9px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all 0.2s;border:1px solid transparent;margin-bottom:3px;display:flex;align-items:center;gap:9px}
.career-opt:hover{background:var(--surface2);color:var(--text)}
.career-opt.active{background:rgba(79,142,247,0.1);border-color:rgba(79,142,247,0.3);color:var(--text)}
.roadmap-display{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;overflow-y:auto}
.roadmap-steps{position:relative;padding-left:30px}
.roadmap-steps::before{content:'';position:absolute;left:9px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--blue),var(--purple),var(--cyan));border-radius:99px}
.r-step{position:relative;margin-bottom:22px;animation:msgIn 0.4s ease}
.r-node{position:absolute;left:-30px;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;top:3px}
.r-content{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:14px}
.r-phase{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--blue);margin-bottom:3px}
.r-title{font-size:14px;font-weight:700;margin-bottom:7px}
.r-items{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.r-tag{padding:3px 9px;border-radius:5px;font-size:11px;font-family:'JetBrains Mono',monospace;background:rgba(79,142,247,0.08);border:1px solid rgba(79,142,247,0.2);color:var(--text2)}
.r-dur{font-size:11px;color:var(--text3)}
.gap-container{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.skill-input-row{display:flex;gap:8px;margin-bottom:12px}
.skill-inp{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:13px;font-family:'Outfit',sans-serif;outline:none}
.skill-inp:focus{border-color:var(--blue)}
.add-btn{padding:10px 16px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif}
.u-skill{padding:6px 12px;border-radius:7px;font-size:12px;font-family:'JetBrains Mono',monospace;background:rgba(155,109,255,0.1);border:1px solid rgba(155,109,255,0.3);color:var(--purple);cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.gap-bar-item{margin-bottom:13px}
.gap-bar-lbl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.gap-bar-track{height:7px;background:var(--surface2);border-radius:99px;overflow:hidden}
.gap-bar-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(0.34,1.56,0.64,1)}
.interview-setup{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:16px}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.role-card{padding:14px;border-radius:11px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all 0.2s;text-align:center}
.role-card:hover,.role-card.selected{border-color:var(--blue);background:rgba(79,142,247,0.08)}
.itab{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s}
.itab.active{background:linear-gradient(135deg,var(--blue),var(--purple));border-color:transparent;color:white}
.interview-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.interview-header{padding:13px 18px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;animation:msgIn 0.3s ease;max-width:300px}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
@media(max-width:900px){
  .app{grid-template-columns:1fr;grid-template-rows:60px auto 1fr}
  .sidebar{grid-row:2;flex-direction:row;overflow-x:auto;padding:8px 12px;border-right:none;border-bottom:1px solid var(--border);height:auto}
  .sidebar-section{display:none}
  .nav-item{flex-direction:column;gap:3px;padding:8px 10px;min-width:56px;font-size:10px}
  .nav-badge{display:none}
  .stats-grid,.feature-grid{grid-template-columns:1fr 1fr}
  .roadmap-grid,.gap-container{grid-template-columns:1fr}
  .q-options,.role-grid{grid-template-columns:1fr}
  .chat-modes{display:none}
}
</style>
</head>
<body>
<div class="bg-canvas"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div class="grid-overlay"></div>
<div class="app">
  <header class="topbar">
    <div class="logo"><div class="logo-icon">🎯</div><span class="logo-text">CareerAI</span></div>
    <span class="topbar-subtitle">Intelligent Career Counselor</span>
    <div class="topbar-right"><div class="ai-badge"><span class="ai-dot"></span>Smart
